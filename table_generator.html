<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Generator</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#0b1020;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      padding:20px;
    }

    .container{
      width:1000px;
      background:#111827;
      padding:25px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#00d4ff;
    }

    .top{
      display:flex;
      gap:10px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    input{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      outline:none;
      font-size:15px;
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:10px;
      background:#00d4ff;
      color:black;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#00aacc;
    }
